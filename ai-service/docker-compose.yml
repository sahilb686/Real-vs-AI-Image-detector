services:
  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-image-detector
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - LOG_LEVEL=INFO
      - MAX_UPLOAD_SIZE_BYTES=10485760
    volumes:
      # Mount models read-only so weights are never modified at runtime
      - ./models:/app/models:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    # TensorFlow is memory-intensive; allocate sufficient resources
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
